# YAAS configuration file
# Global config: ~/.config/yaas/config.toml
# Project overrides: .yaas.toml in project root
#
# See https://github.com/arahizzz/yaas for full documentation

# Container runtime (auto-detected if omitted)
# runtime = "podman"  # or "docker"

# Features (what to mount/forward into the sandbox)
# ssh_agent = false
# git_config = false
# container_socket = false # Docker/Podman socket passthrough
# clipboard = false        # Enable clipboard access for image pasting

# Isolation
# network_mode = "bridge"  # "host", "bridge", or "none"
# readonly_project = false
# pid_mode = "host"        # or omit for isolated PID namespace

# Auto-update
# auto_pull_image = true   # Pull container image on every start
# auto_upgrade_tools = true # Run mise upgrade on every start

# Resource limits
# [resources]
# memory = "8g"
# cpus = 2.0
# pids_limit = 1000

# Global mounts (always applied)
# mounts = ["~/data:/data:ro"]

# Global environment variables (always applied)
# true = forward from host, "value" = hardcoded
# [env]
# GITHUB_TOKEN = true
# GH_TOKEN = true

# Tool shortcuts
# Each tool becomes a CLI command: yaas <tool> [args...]
# - command: executable to run (default: tool name). Supports multi-part commands.
# - yolo_flags: flags appended in YOLO mode (use --no-yolo to disable)
# - mounts: paths mounted from $HOME when running this tool
#   - ".claude" → mounts ~/.claude to sandbox home
#   - ".claude:ro" → same but read-only
#   - "~/a:/data:ro" → explicit source:destination:mode
# - env: environment variables for this tool
#   - KEY = true → forward from host
#   - KEY = "value" → hardcoded value
#
# Tools can also override any container setting:
#   ssh_agent = true
#   git_config = true
#   container_socket = false
#   clipboard = false
#   network_mode = "none"
#   readonly_project = true
#   pid_mode = "host"
#   [tools.<name>.resources]
#   memory = "16g"
#   cpus = 4.0

[tools.claude]
yolo_flags = ["--dangerously-skip-permissions"]
mounts = [".claude", ".claude.json", ".claude/ide:ro"]
env = { ANTHROPIC_API_KEY = true }

